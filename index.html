<html>

<head>
  <!-- Meta & Title -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASL Financial Beta</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <style>
    /* Default (Desktop / Laptop) */
    body {
      font-family: 'Roboto', Arial, sans-serif;
      font-size: 16px;
      margin: 0;
      padding: 0;
    }
    .title-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #f5f5f5;
    }
    .title-left { font-size: 20px; font-weight: bold; }
    .beta { font-size: 10px; margin-left: 8px; color: #888; }
    .summary-bar {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      background: #eaeaea;
    }
    .ticker {
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }
    .detail {
      padding: 20px;
      font-size: 15px;
    }
    .price-box {
      font-size: 18px;
      margin: 10px 0;
    }
    .fundamentals table {
      width: 100%;
      border-collapse: collapse;
    }
    .fundamentals td {
      padding: 4px 8px;
      font-size: 14px;
      border-bottom: 1px solid #ddd;
    }
    .meta {
      margin-top: 8px;
      font-size: 14px;
      color: #666;
    }

    /* Dark Mode */
    body.dark {
      background: #121212;
      color: #f5f5f5;
    }
    body.dark .title-bar { background: #1e1e1e; }
    body.dark .summary-bar { background: #2a2a2a; }
    body.dark .fundamentals td { border-bottom: 1px solid #444; }

    /* iPhone / Mobile (≤1170px width) */
    @media screen and (max-width: 1170px) {
      body { font-size: 26px; line-height: 1.5; }
      .title-left { font-size: 30px; }
      .ticker { font-size: 26px; padding: 12px; }
      .detail { font-size: 24px; }
      .price-box { font-size: 32px; margin: 14px 0; }
      .fundamentals td { font-size: 22px; padding: 8px 12px; }
      h2 { font-size: 28px; margin-bottom: 12px; }
      .meta { font-size: 22px; margin-top: 10px; }
      iframe { width: 100%; height: 520px; }
    }
  </style>
</head>


<body>
  <!-- Title Row -->
  <div class="title-bar">
    <div class="title-left">
      <span class="bold">ASL</span><span class="regular">Financial</span>
      <span class="beta">Beta</span>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>
  </div>

  <!-- Navigation Row -->
  <div class="summary-bar" id="navRow"></div>

  <!-- Content Row -->
  <div class="detail" id="detail">
    <h2>Select a ticker</h2>
    <p>Click on a ticker above to view full summary.</p>
  </div>

  <script>
    const tickers = {
      "IDX:BBCA": {
        title:"Bank Central Asia Tbk PT",
        price:6034, change:0.13, changeVal:8,
        fundamentals:{
          "Prev Close":"Rp5,900","Open":"Rp5,900","High":"Rp6,075","Low":"Rp5,875",
          "Market Cap":"732.25T","Volume":"127.58M","Dividend":"5.58%","P/E Ratio":"12.78"
        }
      },
      "IDX:BBRI": {
        title:"Bank Rakyat Indonesia",
        price:3152, change:3.62, changeVal:110,
        fundamentals:{
          "Prev Close":"Rp3,042","Open":"Rp3,050","High":"Rp3,180","Low":"Rp3,020",
          "Market Cap":"600T","Volume":"120M","Dividend":"4.8%","P/E Ratio":"11.5"
        }
      },
      "IDX:BMRI": {
        title:"Bank Mandiri",
        price:4490, change:-1.58, changeVal:-72,
        fundamentals:{
          "Prev Close":"Rp4,562","Open":"Rp4,570","High":"Rp4,600","Low":"Rp4,450",
          "Market Cap":"700T","Volume":"95M","Dividend":"5.1%","P/E Ratio":"12.2"
        }
      }
    };

    function formatTime(date){
      return date.toLocaleString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+" WIB";
    }

    function renderNav(){
      const nav = document.getElementById("navRow");
      nav.innerHTML = '';
      for(const symbol of Object.keys(tickers)){
        nav.innerHTML += `<div class="ticker" onclick="showDetail('${symbol}')">${symbol.split(':')[1]}</div>`;
      }
    }

    function showDetail(symbol){
      const d = tickers[symbol];
      const changeClass = d.change>=0 ? 'price-change-up' : 'price-change-down';
      const now = new Date();
      let fundamentalsHTML = '<div class="fundamentals"><h3>Fundamentals</h3><table>';
      for(const [key,val] of Object.entries(d.fundamentals)){
        fundamentalsHTML += `<tr><td>${key}</td><td>${val}</td></tr>`;
      }
      fundamentalsHTML += '</table></div>';
      const theme = document.body.classList.contains('dark') ? 'dark' : 'light';
      document.getElementById("detail").innerHTML = `
        <h2>${d.title}</h2>
        <div class="price-box">
          Rp${d.price}
          <span class="${changeClass}">${d.change.toFixed(2)}% (${d.changeVal})</span>
          <span class="currency">IDR</span>
        </div>
        <div class="meta">${formatTime(now)}</div>
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=${symbol}&interval=D&theme=${theme}&style=1&locale=en"
                width="100%" height="420" frameborder="0"></iframe>
        ${fundamentalsHTML}
      `;
    }

    document.getElementById("themeToggle").addEventListener("change", function(){
      if(this.checked){ document.body.classList.add("dark"); }
      else { document.body.classList.remove("dark"); }
      // re-render detail to refresh chart theme
      const detail = document.getElementById("detail");
      const currentTitle = detail.querySelector("h2");
      if(currentTitle){
        const currentSymbol = Object.keys(tickers).find(s => tickers[s].title===currentTitle.textContent);
        if(currentSymbol){ showDetail(currentSymbol); }
      }
    });

    // Init
    renderNav();
  </script>
</body>



</html>
