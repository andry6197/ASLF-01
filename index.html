<html>

<head>
  <!-- Version Revision: 01.2026.12 -->
  <meta charset="UTF-8">
  <title>ASL Financial</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: 'Roboto', Arial, sans-serif;
      margin:0;
      background:#fff;
      color:#000;
      transition: background 0.3s, color 0.3s;
      font-size:16px;
    }
    body.dark { background:#121212; color:#eee; }

    /* Title Row */
    .title-bar { display:flex; justify-content:space-between; align-items:center;
      padding:12px 20px; border-bottom:1px solid #ddd; background:#f9f9f9; }
    .title-left { font-size:20px; }
    .title-left span.bold { font-weight:700; }
    .title-left span.regular { font-weight:400; margin-left:4px; }
    .beta { font-size:50%; color:#888; margin-left:8px; border:1px solid #ccc;
      padding:1px 4px; border-radius:4px; vertical-align:middle; }

    /* Toggle Switch */
    .toggle-switch { position:relative; width:50px; height:24px; }
    .toggle-switch input { display:none; }
    .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0;
      background:#ccc; transition:.4s; border-radius:24px; }
    .slider:before { position:absolute; content:""; height:18px; width:18px;
      left:3px; bottom:3px; background:white; transition:.4s; border-radius:50%; }
    input:checked + .slider { background:#0077cc; }
    input:checked + .slider:before { transform:translateX(26px); }

    /* Navigation Row */
    .summary-bar { display:flex; overflow-x:auto; background:#fff; padding:10px 20px;
      border-bottom:1px solid #eee; }
    .ticker { margin:0 12px; cursor:pointer; font-weight:500; white-space:nowrap; font-size:15px; }
    .ticker.up { color:#0a0; }
    .ticker.down { color:#d00; }

    /* Content Row */
    .detail { padding:20px; font-size:15px; }
    .price-box { font-size:18px; margin-bottom:4px; color:#000; }
    body.dark .price-box { color:#fff; }
    .price-change-up { color:#0a0; font-size:16px; margin-left:6px; }
    .price-change-down { color:#d00; font-size:16px; margin-left:6px; }
    .currency { font-size:16px; color:#666; margin-left:6px; }
    body.dark .currency { color:#ccc; }
    .meta { margin-top:6px; font-size:12px; color:#666; }
    body.dark .meta { color:#aaa; }
    iframe { width:100%; height:320px; border:none; margin-top:20px; }
    .fundamentals { margin-top:12px; border-top:1px solid #ddd; padding-top:12px; }
    .fundamentals h3 { font-size:16px; margin-bottom:8px; }
    .fundamentals table { width:100%; border-collapse:collapse; }
    .fundamentals td { padding:6px 8px; font-size:14px; border-bottom:1px solid #eee; color:#000; }
    body.dark .fundamentals td { color:#fff; border-bottom:1px solid #444; }

    /* Responsive khusus iPhone */
    @media screen and (max-width:768px) {
      body { font-size:20px; }
      .title-left { font-size:24px; }
      .ticker { font-size:19px; }
      .detail { font-size:18px; }
      .price-box { font-size:22px; }
      .currency { font-size:18px; }
      .meta { font-size:14px; }
      .fundamentals td { font-size:16px; }
      iframe { height:280px; }
    }
  </style>
</head>

<body>
  <!-- Title Row -->
  <div class="title-bar">
    <div class="title-left">
      <span class="bold">ASL</span><span class="regular">Financial</span>
      <span class="beta">Beta</span>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>
  </div>

  <!-- Navigation Row -->
  <div class="summary-bar" id="navRow"></div>

  <!-- Content Row -->
  <div class="detail" id="detail">
    <h2>Select a ticker</h2>
    <p>Click on a ticker above to view full summary.</p>
  </div>

  <script>
    const tickers = [
      {symbol:"IDX:BBCA", title:"Bank Central Asia Tbk PT"},
      {symbol:"IDX:BBRI", title:"Bank Rakyat Indonesia"},
      {symbol:"IDX:BMRI", title:"Bank Mandiri"}
    ];

    // Format waktu
    function formatTime(date){
      return date.toLocaleString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+" WIB";
    }

    // Fetch harga realtime (contoh endpoint, sesuaikan dengan API provider)
    async function fetchPrice(symbol){
      try {
        // Ganti URL ini dengan endpoint REST API yang valid (TradingView/IDX)
        const res = await fetch(`https://api.example.com/quotes?symbol=${symbol}`);
        const data = await res.json();
        return {
          price: data.last,          // harga terakhir
          change: data.change_pct,   // persentase perubahan
          changeVal: data.change     // delta nominal
        };
      } catch(e){
        console.error("Error fetch price", e);
        return {price:"-",change:0,changeVal:0};
      }
    }

    // Render Navigation Row
    async function renderNav(){
      const nav = document.getElementById("navRow");
      nav.innerHTML = '';
      for(const t of tickers){
        const d = await fetchPrice(t.symbol);
        const cls = d.change>=0 ? 'ticker up' : 'ticker down';
        nav.innerHTML += `<div class="${cls}" onclick="showDetail('${t.symbol}','${t.title}',${d.price},${d.change},${d.changeVal})">${t.symbol.split(':')[1]} Rp${d.price} (${d.change.toFixed(2)}%)</div>`;
      }
    }

    // Render Content Row
    function showDetail(symbol,title,price,change,changeVal){
      const changeClass = change>=0 ? 'price-change-up' : 'price-change-down';
      const now = new Date();
      document.getElementById("detail").innerHTML = `
        <h2>${title}</h2>
        <div class="price-box">
          Rp${price}
          <span class="${changeClass}">${change.toFixed(2)}% (${changeVal})</span>
          <span class="currency">IDR</span>
        </div>
        <div class="meta">${formatTime(now)}</div>
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=${symbol}&interval=D&theme=${document.body.classList.contains('dark')?'dark':'light'}&style=1&locale=en"
                width="100%" height="420" frameborder="0"></iframe>
      `;
    }

    // Toggle dark/light mode
    document.getElementById("themeToggle").addEventListener("change", function(){
      if(this.checked){ document.body.classList.add("dark"); }
      else { document.body.classList.remove("dark"); }
    });

    // Init
    renderNav();
    // Refresh setiap 30 detik
    setInterval(renderNav,30000);
  </script>
</body>





</html>
