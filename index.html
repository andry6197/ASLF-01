<html>

<head>
  <!-- Meta & Title -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASL Financial Beta</title>

  <!-- Cache Control: force browser to always reload -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <style>
    /* Default (Desktop / Laptop) */
    body {
      font-family: 'Roboto', Arial, sans-serif;
      font-size: 16px;
      margin: 0;
      padding: 0;
    }
    .title-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: #f5f5f5;
    }
    .title-left { font-size: 20px; font-weight: bold; }
    .beta { font-size: 10px; margin-left: 8px; color: #888; }
    .summary-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      padding: 10px;
      background: #eaeaea;
    }
    .ticker {
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      margin: 4px;
    }
    .detail {
      padding: 20px;
      font-size: 15px;
    }
    .price-box {
      font-size: 18px;
      margin: 10px 0;
    }
    .fundamentals table {
      width: 100%;
      border-collapse: collapse;
    }
    .fundamentals td {
      padding: 4px 8px;
      font-size: 14px;
      border-bottom: 1px solid #ddd;
    }
    .meta {
      margin-top: 8px;
      font-size: 14px;
      color: #666;
    }

    /* Dark Mode */
    body.dark {
      background: #121212;
      color: #f5f5f5;
    }
    body.dark .title-bar { background: #1e1e1e; }
    body.dark .summary-bar { background: #2a2a2a; }
    body.dark .fundamentals td { border-bottom: 1px solid #444; }

    /* iPhone / Mobile (≤1170px width) → 50% smaller fonts */
    @media screen and (max-width: 1170px) {
      body { font-size: 14px; line-height: 1.4; }
      .title-left { font-size: 16px; }
      .ticker { font-size: 14px; padding: 6px; }
      .detail { font-size: 14px; }
      .price-box { font-size: 16px; margin: 8px 0; }
      .fundamentals td { font-size: 13px; padding: 4px 6px; }
      h2 { font-size: 16px; margin-bottom: 8px; }
      .meta { font-size: 13px; margin-top: 6px; }
      iframe { width: 100%; height: 400px; }
    }
  </style>

  <!-- JS: force reload bypass cache -->
  <script>
    // Append timestamp to URL to force reload
    (function(){
      const currentUrl = window.location.href;
      const hasQuery = currentUrl.includes('?');
      const newUrl = hasQuery ? currentUrl + '&t=' + Date.now() : currentUrl + '?t=' + Date.now();
      if(!sessionStorage.getItem('cacheBypass')){
        sessionStorage.setItem('cacheBypass','true');
        window.location.replace(newUrl);
      }
    })();
  </script>
</head>

<body>
  <!-- Title Row -->
  <div class="title-bar">
    <div class="title-left">
      <span class="bold">ASL</span><span class="regular">Financial</span>
      <span class="beta">Beta</span>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>
  </div>

  <!-- Navigation Row -->
  <div class="summary-bar" id="navRow"></div>

  <!-- Content Row -->
  <div class="detail" id="detail">
    <h2>Select a ticker</h2>
    <p>Click on a ticker above to view full summary.</p>
  </div>

  <script>
// Kosong dulu, nanti diisi dari API
const tickers = {};

// Daftar emiten sesuai watchlist
const symbols = [
  "BBCA.JK","BMRI.JK","BBRI.JK","ITMG.JK","PTBA.JK","UNTR.JK","ADRO.JK",
  "GOOG","NVDA","AAPL","AMZN","MSFT","PLTR","TSLA"
];

// Fungsi ambil data dari Alpha Vantage
async function loadData(symbol){
  try {
    const apiKey = "YOUR_API_KEY"; // ganti dengan API key kamu
    const res = await fetch(`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${apiKey}`);
    const data = await res.json();

    // Ambil data harian terbaru
    const latestDate = Object.keys(data["Time Series (Daily)"])[0];
    const prevDate = Object.keys(data["Time Series (Daily)"])[1];
    const daily = data["Time Series (Daily)"][latestDate];
    const prev = data["Time Series (Daily)"][prevDate];

    const close = parseFloat(daily["4. close"]);
    const prevClose = parseFloat(prev["4. close"]);
    const changeVal = close - prevClose;
    const changePct = (changeVal / prevClose) * 100;

    tickers[symbol] = {
      title: symbol,
      price: close,
      change: changePct,
      changeVal: changeVal,
      fundamentals: {
        "Prev Close": prevClose,
        "Open": daily["1. open"],
        "High": daily["2. high"],
        "Low": daily["3. low"],
        "Volume": daily["5. volume"]
      }
    };
  } catch(err){
    console.error("Error load data for", symbol, err);
  }
}

// Loop semua emiten
symbols.forEach(s => loadData(s));


    function formatTime(date){
      return date.toLocaleString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+" WIB";
    }

    function renderNav(){
      const nav = document.getElementById("navRow");
      nav.innerHTML = '';
      for(const symbol of Object.keys(tickers)){
        nav.innerHTML += `<div class="ticker" onclick="showDetail('${symbol}')">${symbol.split(':')[1]}</div>`;
      }
    }

    function showDetail(symbol){
      const d = tickers[symbol];
      const changeClass = d.change>=0 ? 'price-change-up' : 'price-change-down';
      const now = new Date();
      let fundamentalsHTML = '<div class="fundamentals"><h3>Fundamentals</h3><table>';
      for(const [key,val] of Object.entries(d.fundamentals)){
        fundamentalsHTML += `<tr><td>${key}</td><td>${val}</td></tr>`;
      }
      fundamentalsHTML += '</table></div>';
      const theme = document.body.classList.contains('dark') ? 'dark' : 'light';
      document.getElementById("detail").innerHTML = `
        <h2>${d.title}</h2>
        <div class="price-box">
          Rp${d.price}
          <span class="${changeClass}">${d.change.toFixed(2)}% (${d.changeVal})</span>
          <span class="currency">IDR</span>
        </div>
        <div class="meta">${formatTime(now)}</div>
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=${symbol}&interval=D&theme=${theme}&style=1&locale=en"
                width="100%" height="420" frameborder="0"></iframe>
        ${fundamentalsHTML}
      `;
    }

    document.getElementById("themeToggle").addEventListener("change", function(){
      if(this.checked){ document.body.classList.add("dark"); }
      else { document.body.classList.remove("dark"); }
      // re-render detail to refresh chart theme
      const detail = document.getElementById("detail");
      const currentTitle = detail.querySelector("h2");
      if(currentTitle){
        const currentSymbol = Object.keys(tickers).find(s => tickers[s].title===currentTitle.textContent);
        if(currentSymbol){ showDetail(currentSymbol); }
      }
    });

    // Init
    renderNav();
  </script>
</body>

</html>
